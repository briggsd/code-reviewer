name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AI_REVIEW_PACKAGE: "@briggsd/code-reviewer@0.3.1"

jobs:
  dry-run:
    name: AI review dry run
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository config only
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install AI review CLI
        run: bun add --global "$AI_REVIEW_PACKAGE"

      # Keep this dry-run job on `--runtime dummy`: it fires on every PR, INCLUDING
      # forks, so it must never carry a provider secret or run `--runtime pi`. Enable
      # the real model-backed review in the trusted-publish job below instead — it is
      # gated to same-repo PRs by its job-level `if:`.
      - name: Run metadata/diff review without write-back
        env:
          AI_REVIEW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          code-reviewer run \
            --provider github \
            --repo "${{ github.repository }}" \
            --change-id "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --runtime dummy \
            --output-dir .ai-review \
            --ci-exit

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-${{ github.event.pull_request.number }}
          path: .ai-review
          include-hidden-files: true

  trusted-publish:
    name: AI review publish summary
    runs-on: ubuntu-latest
    needs: dry-run
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository config only
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install AI review CLI
        run: bun add --global "$AI_REVIEW_PACKAGE"

      # This job is already gated to same-repo PRs (the job-level `if:` above), so it
      # is the safe place to enable a REAL model-backed review — never the dry-run job,
      # which fires on forks. To enable it: change `--runtime dummy` to `--runtime pi`
      # in the run step below and add a provider credential to its env (matching your
      # .ai-review.json modelRouting provider; Anthropic by default) from a repo secret:
      #     env:
      #       ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # plus a Pi install step (the pi CLI needs Node >= 22.19; add
      # `actions/setup-node@v4` with `node-version: 22` if the runner's Node is older):
      #   - name: Install Pi CLI
      #     run: npm install -g --ignore-scripts @earendil-works/pi-coding-agent@0.79.4
      - name: Publish AI review summary for same-repo PR
        env:
          AI_REVIEW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          code-reviewer run \
            --provider github \
            --repo "${{ github.repository }}" \
            --change-id "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --runtime dummy \
            --publish-summary \
            --output-dir .ai-review \
            --ci-exit
