# Bitbucket Pipelines starter template for Code Reviewer.
# Copy into your repository's bitbucket-pipelines.yml (or merge into an
# existing one) and replace AI_REVIEW_PACKAGE with an immutable tarball URL,
# exact registry version, or full Git commit SHA for the tested build.
# Do not use mutable tags, 'latest', or the runner repository checkout.
#
# Package source
# --------------
# Set AI_REVIEW_PACKAGE to the same value in your Pipelines repository
# variables (Settings > Repository variables) or inline below. Examples:
#   https://example.com/releases/briggsd-code-reviewer-0.2.0.tgz   # tarball URL
#   @briggsd/code-reviewer@0.2.0                                      # npm registry
#
# Required Pipelines variables (Settings > Repository variables)
# --------------------------------------------------------------
# AI_REVIEW_BITBUCKET_TOKEN — a Bitbucket repository or workspace access token
#   with the following scopes:
#     pullrequest:write — post and update PR comments; read PR metadata
#     repository        — read source files for conventions checks
#   Configure it as a SECURED variable so it is not exposed to pipelines
#   triggered by pull requests from forked repositories.
#   App Passwords and HTTP Basic auth are NOT supported; use a Bearer
#   repository/workspace access token only.
#
# AI_REVIEW_BITBUCKET_BOT_UUID — the UUID of the bot account that owns
#   AI_REVIEW_BITBUCKET_TOKEN (e.g. {xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}).
#   Find it in the Bitbucket UI under the access token's settings.
#   Required for reliable re-review and single-comment dedup when using a
#   Repository or Workspace Access Token: GET /user is user-token-only, so
#   without this the adapter must learn its UUID from the first comment it
#   posts, making the first read of each run unable to match the prior comment.
#   Set this variable. For user-bound tokens (App Passwords/OAuth), it is
#   optional but still recommended.
#
# Fork safety model
# -----------------
# Bitbucket withholds SECURED repository variables from pipelines triggered by
# pull requests that originate from a forked repository, so
# AI_REVIEW_BITBUCKET_TOKEN is absent in fork-PR builds.
#
# Unlike GitHub (which injects a read-only GITHUB_TOKEN) and GitLab (which can
# supply a separate read token), Bitbucket has no built-in pipeline token — so
# BOTH steps below need AI_REVIEW_BITBUCKET_TOKEN: the dry-run uses it to READ
# the PR, the publish step to write back. Because that token must be SECURED (it
# grants write access), a fork PR has it for neither step, and the review simply
# does not run — both steps fail closed rather than reading or writing with an
# exposed credential. This is stricter than the same-repo guards used elsewhere:
#   - GitHub: if: github.event.pull_request.head.repo.full_name == github.repository
#   - GitLab: $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == $CI_PROJECT_ID
# On Bitbucket, fork PRs get no automated review unless you deliberately expose a
# credential to forks (not recommended). Same-repo PRs run both steps normally.
#
# Note: cross-repository (fork) pull request pipelines must also be explicitly
# enabled under Repository settings > Pull requests. If that setting is off,
# fork-PR pipelines never run at all, which is also safe.
#
# An adopter who never accepts fork pull requests can collapse both steps into
# one by adding --publish-summary to the dry-run step and removing the
# separate publish step. The two-step default remains the correct choice for
# any repository that could receive fork PRs.

image: oven/bun:1.3

pipelines:
  pull-requests:
    '**':
      - step:
          name: AI review dry run
          image: oven/bun:1.3
          artifacts:
            - .ai-review/**
          script:
            - bun add --global "$AI_REVIEW_PACKAGE"
            - >
              code-reviewer run
              --provider bitbucket
              --repo "$BITBUCKET_REPO_FULL_NAME"
              --change-id "$BITBUCKET_PR_ID"
              --head-sha "$BITBUCKET_COMMIT"
              --runtime dummy
              --output-dir .ai-review
              --ci-exit
          # Dry-run: reads the PR with AI_REVIEW_BITBUCKET_TOKEN; no model
          # secrets, no write-back. The token is SECURED, so this step also
          # fails closed on fork PRs (Bitbucket has no built-in read token) —
          # see the Fork safety model note above. Same-repo PRs run normally.

      - step:
          name: AI review publish summary
          image: oven/bun:1.3
          artifacts:
            download: true
            paths:
              - .ai-review/**
          script:
            - bun add --global "$AI_REVIEW_PACKAGE"
            - >
              code-reviewer run
              --provider bitbucket
              --repo "$BITBUCKET_REPO_FULL_NAME"
              --change-id "$BITBUCKET_PR_ID"
              --head-sha "$BITBUCKET_COMMIT"
              --runtime dummy
              --publish-summary
              --output-dir .ai-review
              --ci-exit
          # Publish: writes the summary comment back to the PR.
          # AI_REVIEW_BITBUCKET_TOKEN must be a SECURED repository variable.
          # Bitbucket withholds secured variables from fork-PR pipelines, so
          # this step fails closed (no write-back) on fork PRs rather than
          # running with an exposed token.

# ---------------------------------------------------------------------------
# Enabling real model-backed review (--runtime pi)
# ---------------------------------------------------------------------------
# The steps above run --runtime dummy, which needs no model access. To enable
# a real model-backed review:
#
# 1. The Pi CLI (@earendil-works/pi-coding-agent) requires Node >= 22.19.
#    The oven/bun image ships no Node — switch the publish step to a Node
#    image and install bun on top, the same way the GitLab Pi path works:
#      image: node:22-bookworm-slim
#      script:
#        - npm install -g bun
#        - npm install -g --ignore-scripts @earendil-works/pi-coding-agent@0.79.4
#        - bun add --global "$AI_REVIEW_PACKAGE"
#        - code-reviewer run ... --runtime pi ...
#
# 2. Add your provider API key (ANTHROPIC_API_KEY by default, matching your
#    .ai-review.json modelRouting provider) as a SECURED Pipelines variable
#    and expose it only in the publish step.
#
# See docs/user/ci-templates.md#enabling-the-pi-runtime for full details.
# ---------------------------------------------------------------------------
