stages:
  - review

.ai_review_base:
  image: oven/bun:1.3
  stage: review
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - bun install --frozen-lockfile
  artifacts:
    when: always
    paths:
      - .ai-review/

ai_review_dry_run:
  extends: .ai_review_base
  variables:
    AI_REVIEW_GITLAB_TOKEN: $GITLAB_TOKEN_READ
  script:
    - >
      bun run src/cli.ts run
      --provider gitlab
      --repo "$CI_PROJECT_PATH"
      --change-id "$CI_MERGE_REQUEST_IID"
      --head-sha "$CI_COMMIT_SHA"
      --runtime dummy
      --output-dir .ai-review
      --ci-exit

ai_review_publish_summary:
  extends: .ai_review_base
  needs:
    - ai_review_dry_run
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == $CI_PROJECT_ID'
  variables:
    AI_REVIEW_GITLAB_TOKEN: $GITLAB_TOKEN_WRITE
  script:
    - >
      bun run src/cli.ts run
      --provider gitlab
      --repo "$CI_PROJECT_PATH"
      --change-id "$CI_MERGE_REQUEST_IID"
      --head-sha "$CI_COMMIT_SHA"
      --runtime dummy
      --publish-summary
      --output-dir .ai-review
      --ci-exit
