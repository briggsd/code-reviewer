# Internal/self-managed GitLab beta template.
# Copy this into a beta repository's .gitlab-ci.yml and replace AI_REVIEW_PACKAGE
# with the immutable internal tarball URL for the tested beta build.
#
# Package hosting for self-managed installs
# -----------------------------------------
# The recommended default is the GitLab generic package registry. The API
# download endpoint (not the web-UI path) is what works as AI_REVIEW_PACKAGE:
#   https://gitlab.example.com/api/v4/projects/<project-id>/packages/generic/<pkg>/<ver>/code-reviewer.tgz
# Publishing there uses JOB-TOKEN auth, so no GitHub personal access token is
# needed in each pipeline run. A GitLab releases asset URL works too but
# requires the same JOB-TOKEN fetch workaround for private projects.
#
# If AI_REVIEW_PACKAGE is a fully public URL, bun add --global installs it
# directly (no auth). For a private GitLab registry, use the bun -e fetch
# snippet in the Pi section below (authenticated, origin-checked).
#
# NOTE: oven/bun:1.3 is a Debian slim image — curl is not installed.
# Do not add a before_script step that calls curl to fetch the tarball.
# Use bun add --global for public URLs or the bun -e fetch for private ones.
#
# YAML quoting gotcha
# -------------------
# GitLab CI lints variable values. Strings that contain double-quote
# characters must themselves be single-quoted in YAML, or the linter
# surfaces a misleading "before_script invalid" error rather than pointing
# at the offending variable. Single-quote any value that embeds double quotes.
#
# cache: [] gotcha
# ----------------
# cache: [] is invalid on GitLab 15.x and older and causes a misleading
# "before_script" validation error. Omit the cache key entirely (as done
# here) rather than setting it to an empty list.

stages:
  - review

variables:
  AI_REVIEW_PACKAGE: https://gitlab.example.com/api/v4/projects/<project-id>/packages/generic/code-reviewer/0.2.0/code-reviewer.tgz
  AI_REVIEW_GITLAB_API_BASE_URL: "$CI_API_V4_URL"
  AI_REVIEW_DRY_RUN_RUNTIME: dummy
  AI_REVIEW_PUBLISH_RUNTIME: dummy

.ai_review_base:
  image: oven/bun:1.3
  stage: review
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - bun add --global "$AI_REVIEW_PACKAGE"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - .ai-review/

ai_review_dry_run:
  extends: .ai_review_base
  variables:
    AI_REVIEW_GITLAB_TOKEN: $GITLAB_TOKEN_READ
  script:
    - >
      code-reviewer run
      --provider gitlab
      --api-base-url "${AI_REVIEW_GITLAB_API_BASE_URL:-$CI_API_V4_URL}"
      --repo "$CI_PROJECT_PATH"
      --change-id "$CI_MERGE_REQUEST_IID"
      --head-sha "$CI_COMMIT_SHA"
      --runtime "$AI_REVIEW_DRY_RUN_RUNTIME"
      --output-dir .ai-review
      --ci-exit

ai_review_publish_summary:
  extends: .ai_review_base
  needs:
    - job: ai_review_dry_run
      artifacts: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == $CI_PROJECT_ID'
  variables:
    AI_REVIEW_GITLAB_TOKEN: $GITLAB_TOKEN_WRITE
  script:
    - >
      code-reviewer run
      --provider gitlab
      --api-base-url "${AI_REVIEW_GITLAB_API_BASE_URL:-$CI_API_V4_URL}"
      --repo "$CI_PROJECT_PATH"
      --change-id "$CI_MERGE_REQUEST_IID"
      --head-sha "$CI_COMMIT_SHA"
      --runtime "$AI_REVIEW_PUBLISH_RUNTIME"
      --publish-summary
      --output-dir .ai-review
      --ci-exit

# ---------------------------------------------------------------------------
# Enabling real model-backed review (--runtime pi)
# ---------------------------------------------------------------------------
# The jobs above run the `dummy` runtime, which needs no model access. To run a
# REAL review, set AI_REVIEW_PUBLISH_RUNTIME: pi in a TRUSTED same-project job
# ONLY (never a fork-triggered pipeline), and adjust the job as below. Two gotchas:
#
#   1. The `pi` CLI (@earendil-works/pi-coding-agent) requires Node >= 22.19, and
#      the `oven/bun` image above ships no Node — so the Pi path must use a Node
#      image and install bun on top. Pin the pi version you have tested.
#   2. A tarball in a PRIVATE GitLab package registry needs an authenticated
#      fetch (JOB-TOKEN); `bun add --global <url>` does not send it.
#
# A validated Pi-path base looks like:
#
# .ai_review_pi_base:
#   image: node:22-bookworm-slim
#   stage: review
#   interruptible: true
#   rules:
#     # Same-project guard: never run the Pi path (secrets + model access) on a
#     # fork-triggered pipeline.
#     - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == $CI_PROJECT_ID'
#   before_script:
#     - npm install -g bun
#     - npm install -g --ignore-scripts @earendil-works/pi-coding-agent@0.79.4
#     # Public tarball URL: a plain global install is enough —
#     #   bun add --global "$AI_REVIEW_PACKAGE"
#     # Private GitLab registry: fetch with JOB-TOKEN auth first, then install the file.
#     # The snippet asserts AI_REVIEW_PACKAGE's origin matches your instance
#     # (CI_SERVER_URL) and uses redirect: "error" so the JOB-TOKEN header only ever
#     # travels to your own host and can't follow a cross-origin redirect:
#     - >
#       bun -e 'const u = new URL(process.env.AI_REVIEW_PACKAGE); if (u.origin !== new URL(process.env.CI_SERVER_URL).origin) throw new Error("untrusted package origin: " + u.origin); const r = await fetch(u, { headers: { "JOB-TOKEN": process.env.CI_JOB_TOKEN }, redirect: "error" }); if (!r.ok) throw new Error("download " + r.status); await Bun.write("/tmp/runner.tgz", await r.arrayBuffer());'
#     - bun add --global /tmp/runner.tgz
#   variables:
#     # Provider credential matching your .ai-review.json modelRouting provider
#     # (Anthropic by default). Set as a PROTECTED/masked CI variable, trusted jobs only.
#     ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
#   # Then set AI_REVIEW_PUBLISH_RUNTIME: pi and have the publish job extend
#   # .ai_review_pi_base instead of .ai_review_base.
# ---------------------------------------------------------------------------
