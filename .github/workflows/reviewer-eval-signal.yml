name: Reviewer eval signal

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "src/runner/reviewer-definitions.ts"
      - "src/evals/**"
      - "evals/**"
      - "scripts/evals.ts"
      - ".github/workflows/reviewer-eval-signal.yml"

concurrency:
  group: reviewer-eval-signal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dummy-eval:
    name: Dummy-runtime eval signal (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Advisory, no tokens. The dummy runtime spends nothing and does NOT measure reviewer
      # quality (it ignores prompts) — the real quality gate is the live release holdout eval
      # (M016 S02, release-package.yml). This only confirms the eval harness still loads + scores
      # every scenario end-to-end after a reviewer-definition / eval-harness change. A harness
      # CRASH (nonzero exit) is the negative signal; the deterministic dummy "2/5 passed" is
      # expected, not a failure. continue-on-error keeps it non-blocking.
      - name: Dummy-runtime eval over both splits (advisory, no tokens)
        continue-on-error: true
        run: |
          set +e
          {
            echo '## Reviewer eval signal — dummy runtime (advisory, no tokens)'
            echo ''
            echo 'A reviewer-definition / eval-harness file changed, so the dummy-runtime eval ran as a free PR-time signal. The dummy runtime spends NO tokens and does NOT measure reviewer quality (it ignores prompts) — that is the live release holdout gate (M016 S02). This only confirms the eval harness still loads and scores every scenario end-to-end. **Advisory: it never blocks merge.** The deterministic dummy "2/5 passed" is expected; only a harness crash (nonzero exit, flagged below) is a real signal.'
            echo ''
          } >> "$GITHUB_STEP_SUMMARY"
          status=0
          for dir in evals/scenarios evals/scenarios-dev; do
            echo "### $dir" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            bun run evals --runtime dummy --scenarios "$dir" >> "$GITHUB_STEP_SUMMARY" 2>&1
            rc=$?
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if [ "$rc" -ne 0 ]; then
              status=1
              echo "⚠️ harness did NOT complete cleanly for \`$dir\` (exit $rc) — investigate before relying on the release gate." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "✅ harness ran clean for \`$dir\`." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo '' >> "$GITHUB_STEP_SUMMARY"
          done
          exit $status
