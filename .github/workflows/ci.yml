name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PR/feature branches, but never cancel a main-branch
  # run — that would leave the merged commit with a cancelled (not passing) check.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type-check & tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run check (tsc + test suite)
        run: bun run check

      # Architecture-boundary lint (#27): blocking, but deliberately a separate step from
      # `bun run check` (which stays exactly tsc + test per CLAUDE.md). Rules + remediation
      # messages live in .dependency-cruiser.cjs.
      - name: Architecture boundaries (dependency-cruiser)
        run: bun run boundaries

      # Biome lint + format: BLOCKING since #96 (lint debt cleared + formatter adopted;
      # the bulk reformat commit is listed in .git-blame-ignore-revs). knip/jscpd remain
      # advisory in the quality job below.
      - name: Lint & format (Biome)
        run: bun run lint -- --reporter=github

  quality:
    name: Advisory quality tools
    runs-on: ubuntu-latest
    # Run advisory tools only after the blocking gate passes — no point dedup-scanning
    # code that doesn't type-check or pass tests. Steps stay continue-on-error so
    # findings never block the PR.
    needs: check
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unused exports / dependencies (Knip)
        continue-on-error: true
        run: bun run knip

      - name: Duplicate-code detection (jscpd)
        continue-on-error: true
        run: bun run dup
