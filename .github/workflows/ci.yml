name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PR/feature branches, but never cancel a main-branch
  # run — that would leave the merged commit with a cancelled (not passing) check.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type-check & tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run check (tsc + test suite)
        run: bun run check

  quality:
    name: Advisory quality tools
    runs-on: ubuntu-latest
    # Run advisory tools only after the blocking gate passes — no point linting /
    # dedup-scanning code that doesn't type-check or pass tests. Steps stay
    # continue-on-error so findings never block the PR.
    needs: check
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        continue-on-error: true
        run: bun run lint -- --reporter=github

      - name: Unused exports / dependencies (Knip)
        continue-on-error: true
        run: bun run knip

      - name: Duplicate-code detection (jscpd)
        continue-on-error: true
        run: bun run dup
