name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PR/feature branches, but never cancel a main-branch
  # run — that would leave the merged commit with a cancelled (not passing) check.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type-check & tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run check (tsc + test suite)
        run: bun run check

      # Architecture-boundary lint (#27): blocking, but deliberately a separate step from
      # `bun run check` (which stays exactly tsc + test per CLAUDE.md). Rules + remediation
      # messages live in .dependency-cruiser.cjs.
      - name: Architecture boundaries (dependency-cruiser)
        run: bun run boundaries

      # Biome lint + format: BLOCKING since #96 (lint debt cleared + formatter adopted;
      # the bulk reformat commit is listed in .git-blame-ignore-revs). jscpd remains
      # advisory in the quality job below; knip is now BLOCKING (#158).
      - name: Lint & format (Biome)
        run: bun run lint -- --reporter=github

      # Docs dead-reference check (#92 + #29): BLOCKING. Fails on a dead path or
      # `bun run` script reference in any tracked *.md. Staleness heuristics are
      # advisory and run in the quality job below (docs:stale). Mirrored by `bun run gate`.
      - name: Docs reference check
        run: bun run docs:check

      # Cognitive-complexity ratchet: fails only when a file's violation count rises
      # above its committed baseline (complexity-baseline.json). Existing violations are
      # grandfathered; lower the floor with `bun run complexity:update`. Mirrored by `bun run gate`.
      - name: Complexity ratchet (cognitive complexity baseline)
        run: bun run complexity:check

      # Workflow hygiene (#276): BLOCKING. Every `actions/upload-artifact` step must
      # set `retention-days` so PII/diff content does not persist indefinitely.
      # Mirrored by `bun run gate`.
      - name: Workflow hygiene (retention-days gate)
        run: bun run workflows:check

      # Dead-code ratchet (#158): BLOCKING. knip exits non-zero on any unused file,
      # export, or dependency — keeps the dead-code baseline at zero. Mirrored by `bun run gate`.
      - name: Unused exports / dead-code (Knip)
        run: bun run knip

  quality:
    name: Advisory quality tools
    runs-on: ubuntu-latest
    # Run advisory tools only after the blocking gate passes — no point dedup-scanning
    # code that doesn't type-check or pass tests. Steps stay continue-on-error so
    # findings never block the PR.
    needs: check
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Duplicate-code detection (jscpd)
        continue-on-error: true
        run: bun run dup

      # Docs staleness heuristics (#92 + #29): ADVISORY. Env-var drift, oversized
      # docs, and src/ modules missing from the CLAUDE.md repo map. Never blocks;
      # the dead-reference half is blocking in the check job above (docs:check).
      - name: Docs staleness (advisory)
        continue-on-error: true
        run: bun run docs:stale
