name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dry-run:
    name: AI review dry run
    runs-on: ubuntu-latest
    steps:
      - name: Check out runner source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run metadata/diff review without write-back
        env:
          AI_REVIEW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          bun run src/cli.ts run \
            --provider github \
            --repo "${{ github.repository }}" \
            --change-id "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --runtime dummy \
            --job-kind dry-run \
            --output-dir .ai-review \
            --ci-exit

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-review-${{ github.event.pull_request.number }}
          path: .ai-review/runs
          include-hidden-files: true

  trusted-publish:
    name: AI review publish summary
    runs-on: ubuntu-latest
    needs: dry-run
    if: github.event.pull_request.head.repo.full_name == github.repository && vars.AI_REVIEW_REAL_REVIEW_ENABLED != 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out runner source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish AI review summary for same-repo PR
        env:
          AI_REVIEW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          bun run src/cli.ts run \
            --provider github \
            --repo "${{ github.repository }}" \
            --change-id "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --runtime dummy \
            --job-kind publish \
            --publish-summary \
            --output-dir .ai-review \
            --ci-exit

      - name: Upload trusted publish artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-review-trusted-${{ github.event.pull_request.number }}
          path: .ai-review/runs
          include-hidden-files: true

  trusted-real-review:
    name: AI review publish real Pi summary
    runs-on: ubuntu-latest
    needs: dry-run
    if: github.event.pull_request.head.repo.full_name == github.repository && vars.AI_REVIEW_REAL_REVIEW_ENABLED == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out runner source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Pi
        run: npm install -g --ignore-scripts @earendil-works/pi-coding-agent

      - name: Publish real AI review summary for same-repo PR
        env:
          AI_REVIEW_GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          AI_REVIEW_PI_PROVIDER: ${{ vars.AI_REVIEW_PI_PROVIDER }}
          AI_REVIEW_PI_MODEL: ${{ vars.AI_REVIEW_PI_MODEL }}
          AI_REVIEW_DISABLED_PROVIDERS: ${{ vars.AI_REVIEW_DISABLED_PROVIDERS }}
          AI_REVIEW_EXPOSE_TRACE_PROMPTS: ${{ vars.AI_REVIEW_EXPOSE_TRACE_PROMPTS }}
          # Optional remote telemetry mirror (#51/#174). Default-off: unset ⇒ empty ⇒ no remote
          # leg. Wired only on this real (runtime: pi) job so dummy dry-run events never pollute
          # the fleet backend. URL works as a secret OR a var; the credential must be a secret.
          # Same-repo-gated job (see `if:` above) ⇒ fork PRs never receive these.
          AI_REVIEW_LOKI_URL: ${{ secrets.AI_REVIEW_LOKI_URL || vars.AI_REVIEW_LOKI_URL }}
          AI_REVIEW_LOKI_BASIC_AUTH: ${{ secrets.AI_REVIEW_LOKI_BASIC_AUTH }}
        run: |
          # Redact operator prompts + model output from trace.jsonl by default;
          # set the AI_REVIEW_EXPOSE_TRACE_PROMPTS repo variable to "true" to
          # write the full (unredacted) trace for troubleshooting. Array form so
          # the empty case contributes no argument and never word-splits (SC2086).
          REDACT_ARGS=("--redact-trace")
          if [ "${AI_REVIEW_EXPOSE_TRACE_PROMPTS}" = "true" ]; then
            REDACT_ARGS=()
            echo "::warning::AI_REVIEW_EXPOSE_TRACE_PROMPTS is true — trace.jsonl will contain unredacted operator prompts, embedded PR diff, and model output"
          fi
          bun run src/cli.ts run \
            --provider github \
            --repo "${{ github.repository }}" \
            --change-id "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --runtime pi \
            "${REDACT_ARGS[@]}" \
            --job-kind real-review \
            --pi-provider "${AI_REVIEW_PI_PROVIDER:-anthropic}" \
            --pi-model "${AI_REVIEW_PI_MODEL:-claude-sonnet-4-6}" \
            --publish-summary \
            --output-dir .ai-review \
            --ci-exit

      - name: Upload real review artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-review-real-${{ github.event.pull_request.number }}
          path: .ai-review/runs
          include-hidden-files: true
