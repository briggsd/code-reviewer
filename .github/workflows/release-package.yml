name: Release package artifact

on:
  # Tag push (vX.Y.Z) builds the tarball through the same holdout quality gate and, only on a
  # tag, attaches the tarball + quality stamp to a GitHub Release. workflow_dispatch keeps the
  # artifact-only build path (no Release) for ad-hoc verification.
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      run_checks:
        description: "Run full check suite before packing"
        required: true
        type: boolean
        default: true
      eval_runs:
        description: "Runs per holdout scenario for the release quality gate"
        required: false
        type: string
        default: "3"
      pi_provider:
        description: "Optional Pi provider override, e.g. anthropic. Leave blank to use Pi defaults."
        required: false
        type: string
      pi_model:
        description: "Optional Pi model override, e.g. claude-sonnet-4-6. Must be set with pi_provider."
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pack:
    name: Build npm tarball artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Pi CLI
        run: npm install -g --ignore-scripts @earendil-works/pi-coding-agent

      - name: Run checks
        # Always on a tag push (a real release must pass the check suite); on workflow_dispatch
        # the run_checks input still gates it for ad-hoc artifact builds.
        if: startsWith(github.ref, 'refs/tags/v') || inputs.run_checks
        run: bun run check

      - name: Run package smoke
        run: bun run pack:smoke

      - name: Holdout quality gate (live)
        # Sequential fan-out (scenarios x eval_runs live model calls); bound the wall-clock so a
        # stalled provider call can't hang the release job indefinitely (#130 review).
        timeout-minutes: 30
        env:
          AI_REVIEW_LIVE_EVAL: "1"
          AI_REVIEW_PI_PROVIDER: ${{ inputs.pi_provider }}
          AI_REVIEW_PI_MODEL: ${{ inputs.pi_model }}
          # All three provider keys are exposed so the dispatcher can pick any provider via
          # pi_provider without editing the workflow; Pi reads only the key matching the selected
          # provider. Mirrors pi-live-smoke.yml. This is a trusted workflow_dispatch on a trusted
          # checkout, so the multi-key exposure is bounded to the maintainer who triggered it.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          # On a tag push there are no dispatch inputs, so eval_runs is empty; fall back to 3
          # (the workflow_dispatch default) so the gate runs with a sane run count either way.
          EVAL_RUNS: ${{ inputs.eval_runs || '3' }}
        run: |
          mkdir -p dist
          bun run evals --gate --runs "$EVAL_RUNS" --stamp dist/quality-stamp.json

      - name: Upload quality stamp (always)
        # Runs even when the gate blocks (exit 1) so the stamp — the primary diagnostic for WHY
        # the release was blocked — is preserved. The blocked exit still prevents the tarball.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-stamp-${{ github.sha }}
          path: dist/quality-stamp.json
          if-no-files-found: warn

      - name: Create release tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          ls -l dist/*.tgz

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-code-review-package-${{ github.sha }}
          path: |
            dist/*.tgz
            dist/quality-stamp.json
          if-no-files-found: error

  # Tag-only: attach the gated build to a GitHub Release. Split out from `pack` so the build job
  # stays least-privilege (contents: read); contents: write is confined to this job and runs only
  # after `pack` (and therefore the holdout quality gate) succeeds. No registry publish step.
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ai-code-review-package-${{ github.sha }}
          path: dist

      - name: Create GitHub Release
        # gh CLI is a run-step, not a third-party action, so no SHA pin is required (#96). It uses
        # the built-in GITHUB_TOKEN (contents: write) to create the Release for the pushed tag and
        # attach the tarball + quality stamp. --verify-tag ensures the tag exists on the remote.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            dist/*.tgz \
            dist/quality-stamp.json
