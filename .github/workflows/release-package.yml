name: Release package artifact

on:
  workflow_dispatch:
    inputs:
      run_checks:
        description: "Run full check suite before packing"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pack:
    name: Build npm tarball artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        if: inputs.run_checks
        run: bun run check

      - name: Run package smoke
        run: bun run pack:smoke

      - name: Create release tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          ls -l dist/*.tgz

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-code-review-package-${{ github.sha }}
          path: dist/*.tgz
          if-no-files-found: error
