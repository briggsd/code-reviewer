name: Telemetry Quality Report

on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of recent workflow runs to inspect"
        required: false
        default: "20"

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-report:
    name: Build telemetry quality report
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build quality report
        env:
          AI_REVIEW_GITHUB_TOKEN: ${{ github.token }}
          # Pass the workflow_dispatch input through an env var so the shell never
          # sees raw expression output (avoids GHA script injection); the CLI then
          # validates it as a positive integer.
          RUNS_INPUT: ${{ inputs.runs }}
        run: bun run telemetry:quality --runs "$RUNS_INPUT"

      - name: Upload quality report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: telemetry-quality-report
          path: telemetry-quality-report.json
